<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div>
    <h1>Customers</h1>
    <ol>
        {% for el in customers %}
            <li>
                <a href="{% url 'customers_details' el.pk %}">{{ el }}</a>
            </li>
        {% empty %}
            <li>No customers found.</li>
        {% endfor %}
    </ol>
</div>
</body>
</html>
